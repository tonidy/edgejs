name: ci

on:
  push:
    paths:
      - "napi/**"
      - "unode/**"
      - "napi/v8/**"
      - "napi/cmake/**"
      - "README.md"
      - ".github/workflows/napi-v8.yml"
  pull_request:
    paths:
      - "napi/**"
      - "unode/**"
      - "napi/v8/**"
      - "napi/cmake/**"
      - "README.md"
      - ".github/workflows/napi-v8.yml"

jobs:
  build-linux:
    name: build-linux
    runs-on: ubuntu-latest
    env:
      NAPI_V8_BUILD_METHOD: prebuilt
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Prebuilt V8 For Wasmer
        shell: bash
        run: |
          set -euo pipefail
          V8_VERSION="11.9.1"
          ASSET="v8-linux-amd64.tar.xz"
          V8_ROOT="$PWD/.ci/v8/${V8_VERSION}/linux-amd64"
          mkdir -p "$V8_ROOT"
          curl -fsSL "https://github.com/wasmerio/v8-custom-builds/releases/download/${V8_VERSION}/${ASSET}" -o "$V8_ROOT/${ASSET}"
          tar -xJf "$V8_ROOT/${ASSET}" -C "$V8_ROOT"

          # napi/wasmer currently links dynamic v8 libs; provide local shared wrappers.
          c++ -shared \
            -Wl,--whole-archive "$V8_ROOT/lib/libv8.a" -Wl,--no-whole-archive \
            -o "$V8_ROOT/lib/libv8.so" \
            -ldl -pthread -lm -lrt || true
          cat > "$V8_ROOT/lib/v8_libplatform_stub.cc" <<'EOF'
          extern "C" void __dummy_v8_libplatform() {}
          EOF
          c++ -shared "$V8_ROOT/lib/v8_libplatform_stub.cc" -o "$V8_ROOT/lib/libv8_libplatform.so"
          cat > "$V8_ROOT/lib/v8_libbase_stub.cc" <<'EOF'
          extern "C" void __dummy_v8_libbase() {}
          EOF
          c++ -shared "$V8_ROOT/lib/v8_libbase_stub.cc" -o "$V8_ROOT/lib/libv8_libbase.so"

          echo "V8_INCLUDE_DIR=$V8_ROOT/include" >> "$GITHUB_ENV"
          echo "V8_LIB_DIR=$V8_ROOT/lib" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$V8_ROOT/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Validate public N-API headers stay V8-agnostic
        run: |
          ! rg -n "v8::|<v8.h>|\"v8.h\"" napi/include/js_native_api.h napi/include/node_api.h

      - name: Build napi-v8
        run: cmake -S napi/v8 -B napi/v8/build

      - name: Compile napi-v8
        run: cmake --build napi/v8/build -j4

      - name: Test napi (parallel: napi-v8 + wasmer)
        shell: bash
        run: |
          set -euo pipefail
          (
            ctest --test-dir napi/v8/build --output-on-failure -R napi_v8_tier1_tests
          ) &
          pid_napi=$!
          (
            cargo test --manifest-path napi/wasmer/Cargo.toml --lib -- --nocapture
          ) &
          pid_wasmer=$!
          wait "$pid_napi"
          wait "$pid_wasmer"

      - name: Build unode
        run: |
          cmake -S unode -B build-unode -DCMAKE_BUILD_TYPE=Release
          cmake --build build-unode -j4

      - name: Test unode
        run: ctest --test-dir build-unode --output-on-failure

      - name: Generate dist
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/bin
          cp build-unode/unode dist/bin/unode
          cp README.md dist/README.md
          (cd dist && zip -r ../unode-linux.zip bin README.md)

      - name: Upload artifact unode
        uses: actions/upload-artifact@v4
        with:
          name: unode-linux
          path: unode-linux.zip
          if-no-files-found: error

  build-macos:
    name: build-macos
    runs-on: macos-latest
    env:
      NAPI_V8_BUILD_METHOD: prebuilt
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Prebuilt V8 For Wasmer
        shell: bash
        run: |
          set -euo pipefail
          V8_VERSION="11.9.1"
          ASSET="v8-darwin-arm64.tar.xz"
          V8_ROOT="$PWD/.ci/v8/${V8_VERSION}/darwin-arm64"
          mkdir -p "$V8_ROOT"
          curl -fsSL "https://github.com/wasmerio/v8-custom-builds/releases/download/${V8_VERSION}/${ASSET}" -o "$V8_ROOT/${ASSET}"
          tar -xJf "$V8_ROOT/${ASSET}" -C "$V8_ROOT"

          # napi/wasmer currently links dynamic v8 libs; provide local shared wrappers.
          clang++ -dynamiclib \
            -Wl,-undefined,dynamic_lookup \
            -Wl,-all_load "$V8_ROOT/lib/libv8.a" \
            -framework CoreFoundation \
            -o "$V8_ROOT/lib/libv8.dylib"
          cat > "$V8_ROOT/lib/v8_libplatform_stub.cc" <<'EOF'
          extern "C" void __dummy_v8_libplatform() {}
          EOF
          clang++ -dynamiclib "$V8_ROOT/lib/v8_libplatform_stub.cc" -o "$V8_ROOT/lib/libv8_libplatform.dylib"
          cat > "$V8_ROOT/lib/v8_libbase_stub.cc" <<'EOF'
          extern "C" void __dummy_v8_libbase() {}
          EOF
          clang++ -dynamiclib "$V8_ROOT/lib/v8_libbase_stub.cc" -o "$V8_ROOT/lib/libv8_libbase.dylib"

          echo "V8_INCLUDE_DIR=$V8_ROOT/include" >> "$GITHUB_ENV"
          echo "V8_LIB_DIR=$V8_ROOT/lib" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=$V8_ROOT/lib:${DYLD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Validate public N-API headers stay V8-agnostic
        run: |
          ! rg -n "v8::|<v8.h>|\"v8.h\"" napi/include/js_native_api.h napi/include/node_api.h

      - name: Build napi-v8
        run: cmake -S napi/v8 -B napi/v8/build

      - name: Compile napi-v8
        run: cmake --build napi/v8/build -j4

      - name: Test napi (parallel: napi-v8 + wasmer)
        shell: bash
        run: |
          set -euo pipefail
          (
            ctest --test-dir napi/v8/build --output-on-failure -R napi_v8_tier1_tests
          ) &
          pid_napi=$!
          (
            cargo test --manifest-path napi/wasmer/Cargo.toml --lib -- --nocapture
          ) &
          pid_wasmer=$!
          wait "$pid_napi"
          wait "$pid_wasmer"

      - name: Build unode
        run: |
          cmake -S unode -B build-unode -DCMAKE_BUILD_TYPE=Release
          cmake --build build-unode -j4

      - name: Test unode
        run: ctest --test-dir build-unode --output-on-failure

      - name: Generate dist
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/bin
          cp build-unode/unode dist/bin/unode
          cp README.md dist/README.md
          (cd dist && zip -r ../unode-macos.zip bin README.md)

      - name: Upload artifact unode
        uses: actions/upload-artifact@v4
        with:
          name: unode-macos
          path: unode-macos.zip
          if-no-files-found: error
